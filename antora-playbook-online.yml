# Antora Playbook for online builds
# This playbook refreshes remote assets before generating the site.

site:
  title: Antora Dark Theme
  url: https://antora-supplemental.github.io/antora-dark-theme
  start_page: antora-dark-theme:guide:index.adoc

content:
  sources:
    - url: .
      branches: HEAD
      start_path: docs

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./supplemental-ui

output:
  dir: ./build/site

runtime:
  fetch: true

asciidoc:
  extensions:
    - "@asciidoctor/tabs"
  attributes:
    source-highlighter: highlight.js
    icons: font
